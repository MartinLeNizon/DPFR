# /etc/ipsec.conf - Main office configuration
config setup
	charondebug="ike 2, knl 2, cfg 2"

conn main-to-branch-prod
	authby=secret
	auto=start
	keyexchange=ikev2

	# Local side (main)
	left=10.100.30.2
	leftsubnet=192.168.10.0/24

	# Remote side (branch)
	right=10.200.30.2
	rightsubnet=192.168.20.0/24

	# Cryptographic proposals
	ike=aes256-sha256-modp2048!
	esp=aes256-sha256!

	# Dead peer detection
	dpddelay=30s
	dpdtimeout=120s
	dpdaction=restart