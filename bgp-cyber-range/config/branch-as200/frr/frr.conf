! Create dummy interface 
interface lo
	ip address 192.168.20.1/24
!

! Define our identity
router bgp 200
	bgp router-id 2.2.2.2

	no bgp ebgp-requires-policy
	
	! Peer with the Transit ISP s side of the branch link
	neighbor 10.200.30.3 remote-as 300

	! Address family configuration (IPV4 Unicast)
	address-family ipv4 unicast
		neighbor 10.200.30.3 activate

		! This is the Branch internal network we want Main to find
		network 192.168.20.0/24
	exit-address-family
!

! Static route so WireGuard UDP can reach Main s WAN IP through Transit
ip route 10.100.30.0/24 10.200.30.3
!

log stdout
